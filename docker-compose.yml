services:
  apprise:
    image: caronc/apprise:latest
    restart: unless-stopped
    volumes:
      - apprise-config:/config

  mcp:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - APPRISE_API_URL=http://apprise:8000
    depends_on:
      - apprise

volumes:
  apprise-config:
